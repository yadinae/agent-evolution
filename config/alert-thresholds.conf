# Alert Thresholds Configuration
# Defines thresholds for triggering alerts and warnings

[error_thresholds]
# Critical error rate (0.0 - 1.0)
# Alert when error rate exceeds this value
critical_error_rate = 0.1

# Warning error rate (0.0 - 1.0)
# Warning when error rate exceeds this value
warning_error_rate = 0.05

# API error threshold
api_error_threshold = 0.15

# Authentication error threshold
auth_error_threshold = 0.05

# Rate limit error threshold
rate_limit_threshold = 0.02

[performance_thresholds]
# Minimum acceptable success rate (0.0 - 1.0)
min_success_rate = 0.8

# Maximum average duration (seconds)
max_avg_duration = 60.0

# Maximum token consumption per task
max_tokens_per_task = 50000

# Minimum tasks per hour (for active monitoring)
min_tasks_per_hour = 1

[health_thresholds]
# Critical health score (0-100)
# System considered critical when health score below this value
critical_health_score = 40

# Warning health score (0-100)
# System considered unhealthy when health score below this value
warning_health_score = 60

# Excellent health score (0-100)
# System considered excellent when health score above this value
excellent_health_score = 90

[skill_quality_thresholds]
# Minimum acceptable skill quality score (0-100)
min_skill_quality_score = 60

# Maximum skills with D grade
max_d_grade_skills = 5

# Minimum documentation coverage (0.0 - 1.0)
min_doc_coverage = 0.7

# Maximum skills without tests
max_untested_skills = 10

[resource_thresholds]
# Maximum CPU usage (%)
max_cpu_usage = 80

# Maximum memory usage (%)
max_memory_usage = 85

# Maximum disk usage (%)
max_disk_usage = 90

# Maximum database size (MB)
max_db_size_mb = 1000

[notification_thresholds]
# Minimum interval between notifications (seconds)
min_notification_interval = 300

# Maximum notifications per hour
max_notifications_per_hour = 10

# Enable email notifications
enable_email_notifications = false

# Enable Feishu notifications
enable_feishu_notifications = true

# Enable Slack notifications
enable_slack_notifications = false

[backup_thresholds]
# Minimum backup age before deletion (days)
min_backup_age_days = 30

# Minimum number of backups to retain
min_backups_to_retain = 10

# Maximum backup storage size (MB)
max_backup_storage_mb = 500
